networks:
  app:
    driver: bridge

services:
  main-server:
    platform: linux/amd64
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE_CMD: main-server
    environment:
      HTTP_ADDR: '${HTTP_ADDR:-:8080}'
      PUBLIC_BASE_URL: '${PUBLIC_BASE_URL}'
      INVITE_SECRET: '${INVITE_SECRET}'
      RMS_INTERNAL_URL: '${RMS_INTERNAL_URL:-http://rms:8080}'
      RMS_PUBLIC_URL: '${RMS_PUBLIC_URL:-http://localhost:8023}'
      RMS_ADMIN_API_KEY: '${RMS_ADMIN_API_KEY:-local-rms-admin-key}'
      RMS_JOIN_SECRET: '${RMS_JOIN_SECRET:-local-rms-join-secret}'
      CHAT_INTERNAL_URL: '${CHAT_INTERNAL_URL:-http://chat-server:8080}'
      CHAT_PUBLIC_URL: '${CHAT_PUBLIC_URL:-http://localhost:8023/chat}'
      CHAT_ADMIN_API_KEY: '${CHAT_ADMIN_API_KEY:-local-chat-admin-key}'
      CHAT_JOIN_SECRET: '${CHAT_JOIN_SECRET:-local-chat-join-secret}'
    expose:
      - '8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/healthz']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      rms:
        condition: service_healthy
      chat-server:
        condition: service_healthy
    networks:
      - app

  rms:
    platform: linux/amd64
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE_CMD: rms-server
    environment:
      HTTP_ADDR: '${RMS_HTTP_ADDR:-:8080}'
      PUBLIC_BASE_URL: '${PUBLIC_BASE_URL}'
      INVITE_SECRET: '${INVITE_SECRET}'
      RMS_PUBLIC_URL: '${RMS_PUBLIC_URL:-http://localhost:8023}'
      RMS_ADMIN_API_KEY: '${RMS_ADMIN_API_KEY:-local-rms-admin-key}'
      RMS_JOIN_SECRET: '${RMS_JOIN_SECRET:-local-rms-join-secret}'
      TURN_URL: '${TURN_URL}'
      TURN_TLS_URL: '${TURN_TLS_URL}'
      TURN_USERNAME: '${TURN_USERNAME}'
      TURN_PASSWORD: '${TURN_PASSWORD}'
      ICE_PUBLIC_IP: '${ICE_PUBLIC_IP}'
      ICE_UDP_PORT_MIN: '${ICE_UDP_PORT_MIN}'
      ICE_UDP_PORT_MAX: '${ICE_UDP_PORT_MAX}'
    expose:
      - '8080'
    ports:
      - '${ICE_UDP_PORT_MIN}-${ICE_UDP_PORT_MAX}:${ICE_UDP_PORT_MIN}-${ICE_UDP_PORT_MAX}/udp'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/healthz']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      - turn
    networks:
      - app

  chat-server:
    platform: linux/amd64
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE_CMD: chat-server
    environment:
      HTTP_ADDR: '${CHAT_HTTP_ADDR:-:8080}'
      PUBLIC_BASE_URL: '${PUBLIC_BASE_URL}'
      CHAT_PUBLIC_URL: '${CHAT_PUBLIC_URL:-http://localhost:8023/chat}'
      CHAT_ADMIN_API_KEY: '${CHAT_ADMIN_API_KEY:-local-chat-admin-key}'
      CHAT_JOIN_SECRET: '${CHAT_JOIN_SECRET:-local-chat-join-secret}'
      CHAT_STORAGE: '${CHAT_STORAGE:-postgres}'
      CHAT_AUTO_MIGRATE: '${CHAT_AUTO_MIGRATE:-true}'
      CHAT_POSTGRES_DSN: '${CHAT_POSTGRES_DSN:-postgres://kvatum:kvatum@postgres:5432/kvatum_chat?sslmode=disable}'
      CHAT_REDIS_URL: '${CHAT_REDIS_URL:-redis://redis:6379/0}'
      CHAT_KAFKA_BROKERS: '${CHAT_KAFKA_BROKERS:-kafka:9092}'
      CHAT_S3_ENDPOINT: '${CHAT_S3_ENDPOINT:-http://localhost:9000}'
      CHAT_S3_BUCKET: '${CHAT_S3_BUCKET:-kvatum-chat}'
      CHAT_S3_ACCESS_KEY: '${CHAT_S3_ACCESS_KEY:-kvatum}'
      CHAT_S3_SECRET_KEY: '${CHAT_S3_SECRET_KEY:-kvatum-secret}'
      CHAT_S3_PUBLIC_BASE_URL: '${CHAT_S3_PUBLIC_BASE_URL:-http://localhost:9000/kvatum-chat}'
    expose:
      - '8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/healthz']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - app

  chat-worker:
    platform: linux/amd64
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE_CMD: chat-worker
    environment:
      CHAT_POSTGRES_DSN: '${CHAT_POSTGRES_DSN:-postgres://kvatum:kvatum@postgres:5432/kvatum_chat?sslmode=disable}'
      CHAT_REDIS_URL: '${CHAT_REDIS_URL:-redis://redis:6379/0}'
      CHAT_KAFKA_BROKERS: '${CHAT_KAFKA_BROKERS:-kafka:9092}'
      CHAT_S3_ENDPOINT: '${CHAT_S3_ENDPOINT:-http://localhost:9000}'
      CHAT_S3_BUCKET: '${CHAT_S3_BUCKET:-kvatum-chat}'
      CHAT_S3_ACCESS_KEY: '${CHAT_S3_ACCESS_KEY:-kvatum}'
      CHAT_S3_SECRET_KEY: '${CHAT_S3_SECRET_KEY:-kvatum-secret}'
    depends_on:
      chat-server:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - app

  web:
    platform: linux/amd64
    build:
      context: ../app
      dockerfile: webapp/Dockerfile
    expose:
      - '80'
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_started
      main-server:
        condition: service_healthy
      rms:
        condition: service_healthy
      chat-server:
        condition: service_healthy
    ports:
      - '${GATEWAY_PORT:-8023}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app

  turn:
    image: coturn/coturn:4.6.3
    entrypoint:
      - /bin/sh
      - /etc/coturn/render-turn-config.sh
    environment:
      TURN_USERNAME: '${TURN_USERNAME}'
      TURN_PASSWORD: '${TURN_PASSWORD}'
      TURN_REALM: '${TURN_REALM}'
      TURN_EXTERNAL_IP: '${TURN_EXTERNAL_IP}'
      TURN_PORT: '${TURN_PORT}'
      TURN_TLS_PORT: '${TURN_TLS_PORT}'
      TURN_RELAY_PORT_MIN: '${TURN_RELAY_PORT_MIN}'
      TURN_RELAY_PORT_MAX: '${TURN_RELAY_PORT_MAX}'
    ports:
      - '${TURN_PORT}:3478/udp'
      - '${TURN_PORT}:3478/tcp'
      - '${TURN_TLS_PORT}:5349/tcp'
      - '${TURN_RELAY_PORT_MIN}-${TURN_RELAY_PORT_MAX}:${TURN_RELAY_PORT_MIN}-${TURN_RELAY_PORT_MAX}/udp'
    volumes:
      - ./render-turn-config.sh:/etc/coturn/render-turn-config.sh:ro
    networks:
      - app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-kvatum_chat}'
      POSTGRES_USER: '${POSTGRES_USER:-kvatum}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-kvatum}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app

  redis:
    image: redis:8-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app

  kafka:
    image: apache/kafka:4.1.0
    environment:
      KAFKA_NODE_ID: '1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
    networks:
      - app

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:-kvatum}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-kvatum-secret}'
    volumes:
      - minio_data:/data
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
      - >
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done &&
        mc mb --ignore-existing local/kvatum-chat &&
        printf '[{"AllowedOrigins":["*"],"AllowedMethods":["GET","PUT","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag"],"MaxAgeSeconds":3000}]' > /tmp/cors.json &&
        mc cors set local/kvatum-chat /tmp/cors.json || true &&
        mc anonymous set download local/kvatum-chat
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:-kvatum}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-kvatum-secret}'
    networks:
      - app

volumes:
  postgres_data:
  redis_data:
  minio_data:
